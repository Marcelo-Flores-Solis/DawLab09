components:
  schemas:
    Adress:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        calle:
          type: string
          maxLength: 200
        ciudad:
          type: string
          maxLength: 100
        provincia:
          type: string
          maxLength: 100
        usuario:
          type: integer
      required:
      - calle
      - ciudad
      - id
      - provincia
      - usuario
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        productos:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          readOnly: true
        nombre:
          type: string
          maxLength: 100
        descripcion:
          type: string
      required:
      - descripcion
      - id
      - nombre
      - productos
    EstadoEnum:
      enum:
      - pendiente
      - pagado
      - enviado
      type: string
      description: |-
        * `pendiente` - Pendiente
        * `pagado` - Pagado
        * `enviado` - Enviado
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        detalles:
          type: array
          items:
            $ref: '#/components/schemas/OrderDetail'
          readOnly: true
        fecha:
          type: string
          format: date-time
          readOnly: true
        estado:
          $ref: '#/components/schemas/EstadoEnum'
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        usuario:
          type: integer
      required:
      - detalles
      - fecha
      - id
      - usuario
    OrderDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        cantidad:
          type: integer
          maximum: 2147483647
          minimum: 0
        precio_unitario:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        pedido:
          type: integer
        producto:
          type: integer
      required:
      - cantidad
      - id
      - pedido
      - precio_unitario
      - producto
    PatchedAdress:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        calle:
          type: string
          maxLength: 200
        ciudad:
          type: string
          maxLength: 100
        provincia:
          type: string
          maxLength: 100
        usuario:
          type: integer
    PatchedCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        productos:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          readOnly: true
        nombre:
          type: string
          maxLength: 100
        descripcion:
          type: string
    PatchedOrder:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        detalles:
          type: array
          items:
            $ref: '#/components/schemas/OrderDetail'
          readOnly: true
        fecha:
          type: string
          format: date-time
          readOnly: true
        estado:
          $ref: '#/components/schemas/EstadoEnum'
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        usuario:
          type: integer
    PatchedOrderDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        cantidad:
          type: integer
          maximum: 2147483647
          minimum: 0
        precio_unitario:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        pedido:
          type: integer
        producto:
          type: integer
    PatchedProduct:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 150
        descripcion:
          type: string
        precio:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        stock:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        creado:
          type: string
          format: date-time
          readOnly: true
        categoria:
          type: integer
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 150
        descripcion:
          type: string
        precio:
          type: string
          format: decimal
